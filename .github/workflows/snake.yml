name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *" # Runs every day at 00:00 UTC

  workflow_dispatch:

  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write

    runs-on: ubuntu-latest

    steps:
      - name: Generate ChronoAI Themed Snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}

          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

            dist/snake-boot.svg?color_snake=5E81AC&color_dots=EBF3F9,BDD8F0,8BBDE0,5E9BD4,1B5FA8&color_empty=D9E5F0&color_bg=EBF3F9

            dist/snake-inference.svg?color_snake=00D2FF&color_dots=F0FAFF,BAE6FD,7DD3FC,38BDF8,0369A1&color_empty=E0F7FA&color_bg=F0FAFF

            dist/snake-optimization.svg?color_snake=D08770&color_dots=161020,4B3F2A,7A6230,B08A3A,F0C050&color_empty=0D0A18&color_bg=0B0F19

            dist/snake-research.svg?color_snake=B48EAD&color_dots=020204,2D1B4A,4A2878,6B3FA8,A78BFA&color_empty=0A0009&color_bg=020204

      - name: Push Snake SVGs to Output Branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}