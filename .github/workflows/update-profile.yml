name: ChronoAI Profile Update

on:
  schedule:
    # Runs at the start of each mode in IST (UTC + 5:30):
    # - 06:00 IST -> 00:30 UTC
    # - 11:00 IST -> 05:30 UTC
    # - 17:30 IST -> 12:00 UTC
    # - 21:30 IST -> 16:00 UTC
    - cron: "30 0,5 * * *"
    - cron: "0 12,16 * * *"

  workflow_dispatch:
    inputs:
      use_cache:
        description: 'Use cache copy instead of fresh compile'
        required: true
        type: boolean
        default: true

  push:
    branches:
      - main
    paths:
      - "README.template.md"
      - "generate_readme.py"
      - "chronoai/**"
      - "themes/**"
      - "assets/**"
      - "tests/**"

jobs:
  update-profile:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Compile Cache and ChronoMotion SVGs
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          python generate_readme.py --build-cache

      - name: Generate README
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.use_cache }}" = "false" ]; then
            python generate_readme.py --debug --no-cache
          else
            python generate_readme.py --debug
          fi

      - name: Commit and Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if ! git diff --cached --quiet; then
            git commit -m "chore: update ChronoAI profile"
            git push
          else
            echo "No changes. Skipping commit."
          fi
