<svg width="1600" height="420" viewBox="0 0 1600 420" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" role="img" aria-label="Amarjeet Singh — AI and Machine Learning Engineer">
  <defs>
    <!-- Base canvas fill: daylight clean sky -->
    <linearGradient id="bgBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#EDF2F7"/>
    </linearGradient>

    <!-- Ambient glow — clean bright sunshine reflection -->
    <radialGradient id="ambientGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#3B82F6" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="#3B82F6" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>

    <!-- Aurora: energetic bright cyan light -->
    <radialGradient id="auroraGlow" cx="80%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#00F2FE" stop-opacity="0.22"/>
      <stop offset="60%" stop-color="#00F2FE" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#00F2FE" stop-opacity="0"/>
    </radialGradient>

    <!-- Core: bright active blue -->
    <radialGradient id="coreGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="45%"  stop-color="#93C5FD"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>

    <!-- Inner shimmer -->
    <radialGradient id="shimmerGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <!-- Outer bloom around core -->
    <radialGradient id="coreBloom" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#00F2FE" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#00F2FE" stop-opacity="0"/>
    </radialGradient>

    <!-- Connecting light threads -->
    <linearGradient id="threadFade" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%"   stop-color="#00F2FE" stop-opacity="0.16"/>
      <stop offset="70%"  stop-color="#3B82F6" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </linearGradient>

    <!-- Soft blur -->
    <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>

    <!-- Near-invisible wash -->
    <linearGradient id="hairlineWash" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1600" height="420" fill="url(#bgBase)"/>
  <rect x="0" y="0" width="1600" height="420" fill="url(#hairlineWash)"/>

  <!-- Aurora -->
  <g filter="url(#softBlur)">
    <ellipse cx="1390" cy="210" rx="360" ry="300" fill="url(#auroraGlow)">
      <!-- Faster environment movement -->
      <animateTransform attributeName="transform" type="translate"
                         values="0,0; 15,-10; -12,12; 0,0"
                         dur="20s" calcMode="spline"
                         keySplines="0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1"
                         repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- Ambient Glow -->
  <ellipse cx="1390" cy="210" rx="560" ry="480" fill="url(#ambientGlow)"/>

  <!-- Threads -->
  <g stroke="url(#threadFade)" fill="none" stroke-linecap="round">
    <path d="M 1290,150 C 1080,110 900,120 760,150" stroke-width="0.9" opacity="0.6"/>
    <path d="M 1300,230 C 1090,250 920,230 780,210" stroke-width="0.9" opacity="0.4"/>
    <path d="M 1280,290 C 1060,300 900,280 770,255" stroke-width="0.9" opacity="0.3"/>
  </g>

  <!-- Text -->
  <g font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
    <!-- Main title -->
    <text x="96" y="196" font-size="68" font-weight="600" letter-spacing="-1" fill="#0F172A">AMARJEET SINGH</text>
    <!-- Subtitle -->
    <text x="97" y="234" font-size="20" font-weight="500" letter-spacing="2.4" fill="#475569">AI &amp; MACHINE LEARNING ENGINEER</text>

    <!-- Rotating specialization line — 4 items, 20s loop -->
    <g font-size="17" font-weight="400" fill="#1E293B">
      <text x="97" y="278" opacity="0">
        Designing AI Applications
        <animate attributeName="opacity" dur="20s" repeatCount="indefinite" begin="0s"
                 calcMode="linear" keyTimes="0;0.0375;0.2125;0.25;1" values="0;1;1;0;0"/>
      </text>
      <text x="97" y="278" opacity="0">
        Solving Real-World Problems
        <animate attributeName="opacity" dur="20s" repeatCount="indefinite" begin="0s"
                 calcMode="linear" keyTimes="0;0.25;0.2875;0.4625;0.5;1" values="0;0;1;1;0;0"/>
      </text>
      <text x="97" y="278" opacity="0">
        End-to-End AI Products
        <animate attributeName="opacity" dur="20s" repeatCount="indefinite" begin="0s"
                 calcMode="linear" keyTimes="0;0.5;0.5375;0.7125;0.75;1" values="0;0;1;1;0;0"/>
      </text>
      <text x="97" y="278" opacity="0">
        Transforming Ideas into AI Products
        <animate attributeName="opacity" dur="20s" repeatCount="indefinite" begin="0s"
                 calcMode="linear" keyTimes="0;0.75;0.7875;0.9625;1" values="0;0;1;1;0"/>
      </text>
    </g>
  </g>

  <!-- Centerpiece: Orb -->
  <g transform="translate(1390,210)">
    <!-- Bloom -->
    <circle cx="0" cy="0" r="112" fill="url(#coreBloom)"/>

    <!-- Orb Arcs -->
    <path d="M -70,-40 Q -20,-95 55,-60" fill="none" stroke="#3B82F6" stroke-width="1.2" stroke-linecap="round" opacity="0.22"/>
    <path d="M -60,50 Q -5,90 65,45" fill="none" stroke="#3B82F6" stroke-width="1.2" stroke-linecap="round" opacity="0.16"/>

    <!-- Ripple — slightly faster timing -->
    <circle cx="0" cy="0" r="35" fill="none" stroke="#00F2FE" stroke-width="1" opacity="0">
      <animate attributeName="r" values="35;72" dur="7s" calcMode="spline" keySplines="0.3 0 0.6 1" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.22;0" dur="7s" calcMode="spline" keySplines="0.3 0 0.6 1;0.3 0 0.6 1" repeatCount="indefinite"/>
      <animate attributeName="stroke-width" values="1.5;0.4" dur="7s" calcMode="spline" keySplines="0.3 0 0.6 1" repeatCount="indefinite"/>
    </circle>

    <!-- Core -->
    <circle cx="0" cy="0" r="35" fill="url(#coreGradient)" opacity="0.95">
      <animate attributeName="r" values="34;37;34" dur="5s" calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;1;0.9" dur="5s" calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1" repeatCount="indefinite"/>
    </circle>

    <!-- Inner shimmer -->
    <circle cx="-4" cy="-5" r="12" fill="url(#shimmerGradient)" opacity="0.3">
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="4s" calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1" repeatCount="indefinite"/>
      <animate attributeName="r" values="10;14;10" dur="4s" calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Signature -->
  <text x="1504" y="398" text-anchor="end" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" font-weight="400" letter-spacing="0.5" fill="#475569">SAmarjeet05 · Daylight Atmosphere</text>
</svg>
