<?xml version="1.0" encoding="UTF-8"?>
<svg width="1600" height="420" viewBox="0 0 1600 420"
xmlns="http://www.w3.org/2000/svg" role="img"
aria-label="Amarjeet Singh — AI and Machine Learning Engineer">
<defs>
<linearGradient id="bgBase" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#FCFEFF"/>
<stop offset="45%" stop-color="#F2F9FF"/>
<stop offset="100%" stop-color="#E5F2FB"/>
</linearGradient>

<radialGradient id="sunGlow" cx="20%" cy="22%" r="55%">
<stop offset="0%" stop-color="#FFFCEB" stop-opacity=".34"/>
<stop offset="60%" stop-color="#FFFCEB" stop-opacity=".10"/>
<stop offset="100%" stop-color="#FFFCEB" stop-opacity="0"/>
</radialGradient>

<radialGradient id="ambientGlow" cx="72%" cy="50%" r="60%">
<stop offset="0%" stop-color="#56CCF2" stop-opacity=".10"/>
<stop offset="60%" stop-color="#56CCF2" stop-opacity=".03"/>
<stop offset="100%" stop-color="#56CCF2" stop-opacity="0"/>
</radialGradient>

<radialGradient id="auroraGlow" cx="82%" cy="50%" r="50%">
<stop offset="0%" stop-color="#00F2FE" stop-opacity=".26"/>
<stop offset="60%" stop-color="#00F2FE" stop-opacity=".08"/>
<stop offset="100%" stop-color="#00F2FE" stop-opacity="0"/>
</radialGradient>

<radialGradient id="coreGradient">
<stop offset="0%" stop-color="#FFF"/>
<stop offset="40%" stop-color="#A9DBFF"/>
<stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
</radialGradient>

<radialGradient id="coreBloom">
<stop offset="0%" stop-color="#00F2FE" stop-opacity=".22"/>
<stop offset="100%" stop-color="#00F2FE" stop-opacity="0"/>
</radialGradient>

<radialGradient id="shimmerGradient">
<stop offset="0%" stop-color="#FFF" stop-opacity=".95"/>
<stop offset="100%" stop-color="#FFF" stop-opacity="0"/>
</radialGradient>

<linearGradient id="threadFade" x1="100%" y1="0%" x2="0%" y2="0%">
<stop offset="0%" stop-color="#00F2FE" stop-opacity=".16"/>
<stop offset="70%" stop-color="#3B82F6" stop-opacity=".05"/>
<stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
</linearGradient>

<filter id="blur"><feGaussianBlur stdDeviation="12"/></filter>
</defs>

<rect width="1600" height="420" fill="url(#bgBase)"/>
<ellipse cx="250" cy="110" rx="500" ry="240" fill="url(#sunGlow)"/>
<ellipse cx="1380" cy="210" rx="560" ry="460" fill="url(#ambientGlow)"/>

<g filter="url(#blur)">
<ellipse cx="1390" cy="205" rx="360" ry="300" fill="url(#auroraGlow)">
<animateTransform attributeName="transform" type="translate"
values="0,0;18,-12;-14,12;0,0" dur="18s" repeatCount="indefinite"/>
</ellipse>
</g>

<g fill="#D8F7FF" opacity=".05">
<circle cx="1180" cy="95" r="1.2"><animate attributeName="cy" values="95;75;95" dur="35s" repeatCount="indefinite"/></circle>
<circle cx="1320" cy="270" r="1.4"><animate attributeName="cy" values="270;245;270" dur="32s" repeatCount="indefinite"/></circle>
<circle cx="1450" cy="170" r="1.3"><animate attributeName="cy" values="170;145;170" dur="37s" repeatCount="indefinite"/></circle>
</g>

<g stroke="url(#threadFade)" fill="none" stroke-linecap="round">
<path d="M1290,145 C1100,75 900,115 760,155" stroke-width=".9" opacity=".65"/>
<path d="M1300,225 C1090,280 920,220 780,205" stroke-width=".9" opacity=".45"/>
<path d="M1280,295 C1075,335 905,285 770,245" stroke-width=".9" opacity=".3"/>
</g>

<g font-family="-apple-system,'Segoe UI',Helvetica,Arial,sans-serif">
<text x="96" y="196" font-size="68" font-weight="600" fill="#0F172A">AMARJEET SINGH</text>
<text x="97" y="234" font-size="20" font-weight="500" letter-spacing="2.4" fill="#4B647A">AI &amp; MACHINE LEARNING ENGINEER</text>

<g font-size="17" fill="#1E293B">
<text x="97" y="278" opacity="0">Designing AI Applications
<animate attributeName="opacity" dur="20s" repeatCount="indefinite" keyTimes="0;0.0375;0.2125;0.25;1" values="0;1;1;0;0"/></text>
<text x="97" y="278" opacity="0">Solving Real-World Problems
<animate attributeName="opacity" dur="20s" repeatCount="indefinite" keyTimes="0;0.25;0.2875;0.4625;0.5;1" values="0;0;1;1;0;0"/></text>
<text x="97" y="278" opacity="0">End-to-End AI Products
<animate attributeName="opacity" dur="20s" repeatCount="indefinite" keyTimes="0;0.5;0.5375;0.7125;0.75;1" values="0;0;1;1;0;0"/></text>
<text x="97" y="278" opacity="0">Transforming Ideas into AI Products
<animate attributeName="opacity" dur="20s" repeatCount="indefinite" keyTimes="0;0.75;0.7875;0.9625;1" values="0;0;1;1;0"/></text>
</g>
</g>

<g transform="translate(1390,198)">
<circle r="116" fill="url(#coreBloom)"/>
<path d="M-72,-42 Q-18,-100 58,-58" fill="none" stroke="#3B82F6" stroke-width="1.2" opacity=".22"/>
<path d="M-60,52 Q0,95 68,45" fill="none" stroke="#3B82F6" stroke-width="1.2" opacity=".16"/>

<circle r="35" fill="none" stroke="#00F2FE" stroke-width="1.2" opacity="0">
<animate attributeName="r" values="35;76" dur="6.5s" repeatCount="indefinite"/>
<animate attributeName="opacity" values="0;.24;0" dur="6.5s" repeatCount="indefinite"/>
</circle>

<circle r="35" fill="url(#coreGradient)">
<animate attributeName="r" values="35;37.2;35" dur="4.8s" repeatCount="indefinite"/>
<animate attributeName="opacity" values=".92;1;.92" dur="4.8s" repeatCount="indefinite"/>
</circle>

<circle cx="-4" cy="-5" r="12" fill="url(#shimmerGradient)" opacity=".3">
<animate attributeName="opacity" values=".2;.55;.2" dur="3.8s" repeatCount="indefinite"/>
<animate attributeName="r" values="10;14.5;10" dur="3.8s" repeatCount="indefinite"/>
</circle>
</g>

<text x="1504" y="398" text-anchor="end"
font-family="-apple-system,'Segoe UI',Helvetica,Arial,sans-serif"
font-size="11" fill="#4B647A">SAmarjeet05 · Peak Daylight</text>
</svg>
