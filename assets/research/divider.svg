<svg width="1000" height="2" viewBox="0 0 1000 2" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="nightGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E7D8FF" stop-opacity="0"/>
      <stop offset="20%" stop-color="#B794F4" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#A855F7" stop-opacity="0.9"/>
      <stop offset="80%" stop-color="#B794F4" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#E7D8FF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1000" height="2" fill="url(#nightGrad)">
    <animate attributeName="opacity"
      values="0.8;0.95;0.8"
      dur="12s"
      repeatCount="indefinite"/>
  </rect>
</svg>