<text x="97" y="278" opacity="0">Exploring Large Language Models<animate attributeName="opacity" dur="20s" repeatCount="indefinite" keyTimes="0;0.25;0.2875;0.4625;0.5;1" values="0;0;1;1;0;0"/></text>
<text x="97" y="278" opacity="0">Building AI Agents<animate attributeName="opacity" dur="20s" repeatCount="indefinite" keyTimes="0;0.5;0.5375;0.7125;0.75;1" values="0;0;1;1;0;0"/></text>
<text x="97" y="278" opacity="0">Deep Learning Exploration<animate attributeName="opacity" dur="20s" repeatCount="indefinite" keyTimes="0;0.75;0.7875;0.9625;1" values="0;0;1;1;0"/></text>
