<svg width="220" height="30" viewBox="0 0 220 30" fill="none"
  xmlns="http://www.w3.org/2000/svg">

  <defs>
    <radialGradient id="nightOrb">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="40%" stop-color="#E9D5FF"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </radialGradient>
  </defs>

  <text x="10" y="19" fill="#6B7280" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11" font-weight="600" letter-spacing="1.5">
AI STATUS
  </text>

  <circle cx="100" cy="15" r="4.5" fill="url(#nightOrb)">
    <animate attributeName="r" values="4.5;4.8;4.5" dur="3.8s" repeatCount="indefinite"/>
  </circle>

  <circle cx="100" cy="15" r="7.5" stroke="#B794F4" stroke-width="1.4" fill="none">
    <animate attributeName="r" values="7.5;10.5;7.5" dur="3.8s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.18;0;0.18" dur="3.8s" repeatCount="indefinite"/>
  </circle>

  <text x="115" y="19" fill="#1F2937" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12" font-weight="600">
Research
  </text>

</svg>