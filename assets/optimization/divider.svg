<svg width="1000" height="6" viewBox="0 0 1000 6" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="divGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D08770" stop-opacity="0"/>
      <stop offset="25%" stop-color="#D08770" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#F59E0B" stop-opacity="1"/>
      <stop offset="75%" stop-color="#D08770" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#D08770" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-10%" y="-100%" width="120%" height="300%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect y="2" width="1000" height="2" fill="url(#divGrad)" filter="url(#glow)"/>
</svg>
