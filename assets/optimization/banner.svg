<?xml version="1.0" encoding="UTF-8"?>
<svg width="1600" height="420" viewBox="0 0 1600 420"
  xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Amarjeet Singh — AI and Machine Learning Engineer">
  <defs>
    <linearGradient id="bgBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF8EC"/>
      <stop offset="40%" stop-color="#FCEFD8"/>
      <stop offset="72%" stop-color="#EADFCF"/>
      <stop offset="100%" stop-color="#D8E3F1"/>
    </linearGradient>

    <linearGradient id="sunsetBand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFD9A3" stop-opacity=".10"/>
      <stop offset="45%" stop-color="#FFC57A" stop-opacity=".05"/>
      <stop offset="100%" stop-color="#7FB6FF" stop-opacity=".06"/>
    </linearGradient>

    <radialGradient id="sunGlow" cx="18%" cy="26%" r="55%">
      <stop offset="0%" stop-color="#FFF5D7" stop-opacity=".28"/>
      <stop offset="60%" stop-color="#FFF5D7" stop-opacity=".08"/>
      <stop offset="100%" stop-color="#FFF5D7" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="ambientGlow" cx="84%" cy="50%" r="58%">
      <stop offset="0%" stop-color="#E39A63" stop-opacity=".18"/>
      <stop offset="65%" stop-color="#E39A63" stop-opacity=".05"/>
      <stop offset="100%" stop-color="#E39A63" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="skyBlue" cx="82%" cy="42%" r="52%">
      <stop offset="0%" stop-color="#89C8FF" stop-opacity=".12"/>
      <stop offset="100%" stop-color="#89C8FF" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="core">
      <stop offset="0%" stop-color="#FFF"/>
      <stop offset="30%" stop-color="#FFE7A7"/>
      <stop offset="62%" stop-color="#F2AE69"/>
      <stop offset="100%" stop-color="#D08770" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="bloom">
      <stop offset="0%" stop-color="#E39A63" stop-opacity=".20"/>
      <stop offset="100%" stop-color="#E39A63" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="shine">
      <stop offset="0%" stop-color="#FFF"/>
      <stop offset="100%" stop-color="#FFF" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="threads" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#D08770" stop-opacity=".18"/>
      <stop offset="70%" stop-color="#8DBFFF" stop-opacity=".05"/>
      <stop offset="100%" stop-color="#8DBFFF" stop-opacity="0"/>
    </linearGradient>

    <filter id="blur">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <rect width="1600" height="420" fill="url(#bgBase)"/>
  <rect width="1600" height="420" fill="url(#sunsetBand)"/>
  <ellipse cx="240" cy="120" rx="520" ry="250" fill="url(#sunGlow)"/>
  <ellipse cx="1385" cy="205" rx="420" ry="320" fill="url(#ambientGlow)"/>
  <ellipse cx="1385" cy="205" rx="360" ry="300" fill="url(#skyBlue)"/>

  <g filter="url(#blur)">
    <ellipse cx="1390" cy="205" rx="350" ry="285" fill="url(#ambientGlow)">
      <animateTransform attributeName="transform" type="translate" values="0,0;10,-8;-8,6;0,0" dur="24s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <g fill="#FFF6E5" opacity=".045">
    <circle cx="1180" cy="95" r="1.2">
      <animate attributeName="cy" values="95;78;95" dur="42s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1325" cy="290" r="1.1">
      <animate attributeName="cy" values="290;268;290" dur="38s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1460" cy="160" r="1.4">
      <animate attributeName="cy" values="160;145;160" dur="45s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g stroke="url(#threads)" fill="none" stroke-linecap="round">
    <path d="M1290,145 C1100,80 905,118 760,155" stroke-width=".85" opacity=".65"/>
    <path d="M1300,228 C1095,278 925,222 780,205" stroke-width=".85" opacity=".45"/>
    <path d="M1285,295 C1080,332 910,286 770,246" stroke-width=".85" opacity=".3"/>
  </g>

  <g font-family="-apple-system,'Segoe UI',Helvetica,Arial,sans-serif">
    <text x="96" y="196" font-size="68" font-weight="600" fill="#273547">AMARJEET SINGH</text>
    <text x="97" y="234" font-size="20" font-weight="500" letter-spacing="2.4" fill="#6E6F73">AI &amp; MACHINE LEARNING ENGINEER</text>

    <g font-size="17" fill="#B56C2F">
      <text x="97" y="278" opacity="0">Optimizing Intelligence<animate attributeName="opacity" dur="20s" repeatCount="indefinite" keyTimes="0;0.0375;0.2125;0.25;1" values="0;1;1;0;0"/>
      </text>
      <text x="97" y="278" opacity="0">Optimizing AI Systems<animate attributeName="opacity" dur="20s" repeatCount="indefinite" keyTimes="0;0.25;0.2875;0.4625;0.5;1" values="0;0;1;1;0;0"/>
      </text>
      <text x="97" y="278" opacity="0">Scaling Intelligence<animate attributeName="opacity" dur="20s" repeatCount="indefinite" keyTimes="0;0.5;0.5375;0.7125;0.75;1" values="0;0;1;1;0;0"/>
      </text>
      <text x="97" y="278" opacity="0">Continuous Learning<animate attributeName="opacity" dur="20s" repeatCount="indefinite" keyTimes="0;0.75;0.7875;0.9625;1" values="0;0;1;1;0"/>
      </text>
    </g>
  </g>

  <g transform="translate(1390,198)">
    <circle r="112" fill="url(#bloom)"/>
    <path d="M-72,-42 Q-18,-100 58,-58" fill="none" stroke="#D08770" stroke-width="1.1" opacity=".22"/>
    <path d="M-60,52 Q0,95 68,45" fill="none" stroke="#6FAEFF" stroke-width="1.0" opacity=".14"/>

    <circle r="35" fill="none" stroke="#F59E0B" stroke-width="1.2" opacity="0">
      <animate attributeName="r" values="35;74" dur="8.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;.18;0" dur="8.5s" repeatCount="indefinite"/>
    </circle>

    <circle r="35" fill="url(#core)" opacity=".95">
      <animate attributeName="r" values="35;36.2;35" dur="6.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values=".9;1;.9" dur="6.8s" repeatCount="indefinite"/>
    </circle>

    <circle cx="-4" cy="-5" r="12" fill="url(#shine)" opacity=".28">
      <animate attributeName="opacity" values=".18;.42;.18" dur="5.8s" repeatCount="indefinite"/>
      <animate attributeName="r" values="10;13;10" dur="5.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <text x="1504" y="398" text-anchor="end" font-family="-apple-system,'Segoe UI',Helvetica,Arial,sans-serif" font-size="11" fill="#C27A43">SAmarjeet05 · Golden Hour</text>
</svg>
