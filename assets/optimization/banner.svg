<svg width="1600" height="420" viewBox="0 0 1600 420" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" role="img" aria-label="Amarjeet Singh — AI and Machine Learning Engineer">
  <defs>
    <!-- Base canvas fill: rich sunset slate-indigo -->
    <linearGradient id="bgBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0F19"/>
      <stop offset="100%" stop-color="#1E132D"/>
    </linearGradient>

    <!-- Ambient glow — warm golden sunset amber glow -->
    <radialGradient id="ambientGlow" cx="80%" cy="50%" r="60%">
      <stop offset="0%"  stop-color="#D08770" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#D08770" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#D08770" stop-opacity="0"/>
    </radialGradient>

    <!-- Aurora: sunset blue-purple aura -->
    <radialGradient id="auroraGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#3B82F6" stop-opacity="0.08"/>
      <stop offset="60%" stop-color="#3B82F6" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>

    <!-- Core: orb catches glowing sunset orange/amber light -->
    <radialGradient id="coreGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="40%"  stop-color="#FDE68A"/>
      <stop offset="100%" stop-color="#D08770" stop-opacity="0"/>
    </radialGradient>

    <!-- Inner shimmer -->
    <radialGradient id="shimmerGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <!-- Outer bloom around core -->
    <radialGradient id="coreBloom" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#D08770" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#D08770" stop-opacity="0"/>
    </radialGradient>

    <!-- Connecting light threads — warm amber -->
    <linearGradient id="threadFade" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%"   stop-color="#D08770" stop-opacity="0.18"/>
      <stop offset="70%"  stop-color="#3B82F6" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </linearGradient>

    <!-- Soft blur -->
    <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15"/>
    </filter>

    <!-- Near-invisible wash -->
    <linearGradient id="hairlineWash" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.015"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1600" height="420" fill="url(#bgBase)"/>
  <rect x="0" y="0" width="1600" height="420" fill="url(#hairlineWash)"/>

  <!-- Aurora -->
  <g filter="url(#softBlur)">
    <ellipse cx="1390" cy="210" rx="360" ry="300" fill="url(#auroraGlow)">
      <animateTransform attributeName="transform" type="translate"
                         values="0,0; 12,-8; -8,8; 0,0"
                         dur="24s" calcMode="spline"
                         keySplines="0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1"
                         repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- Ambient Golden Glow -->
  <ellipse cx="1390" cy="210" rx="560" ry="480" fill="url(#ambientGlow)"/>

  <!-- Threads -->
  <g stroke="url(#threadFade)" fill="none" stroke-linecap="round">
    <path d="M 1290,150 C 1080,110 900,120 760,150" stroke-width="0.85" opacity="0.7"/>
    <path d="M 1300,230 C 1090,250 920,230 780,210" stroke-width="0.85" opacity="0.5"/>
    <path d="M 1280,290 C 1060,300 900,280 770,255" stroke-width="0.85" opacity="0.3"/>
  </g>

  <!-- Text -->
  <g font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
    <!-- Main title -->
    <text x="96" y="196" font-size="68" font-weight="600" letter-spacing="-1" fill="#F8FAFC">AMARJEET SINGH</text>
    <!-- Subtitle -->
    <text x="97" y="234" font-size="20" font-weight="500" letter-spacing="2.4" fill="#CBD5E1">AI &amp; MACHINE LEARNING ENGINEER</text>

    <!-- Rotating specialization line — 4 items, 20s loop -->
    <g font-size="17" font-weight="400" fill="#FDE68A">
      <text x="97" y="278" opacity="0">
        Optimizing Intelligence
        <animate attributeName="opacity" dur="20s" repeatCount="indefinite" begin="0s"
                 calcMode="linear" keyTimes="0;0.0375;0.2125;0.25;1" values="0;1;1;0;0"/>
      </text>
      <text x="97" y="278" opacity="0">
        Optimizing AI Systems
        <animate attributeName="opacity" dur="20s" repeatCount="indefinite" begin="0s"
                 calcMode="linear" keyTimes="0;0.25;0.2875;0.4625;0.5;1" values="0;0;1;1;0;0"/>
      </text>
      <text x="97" y="278" opacity="0">
        Scaling Intelligence
        <animate attributeName="opacity" dur="20s" repeatCount="indefinite" begin="0s"
                 calcMode="linear" keyTimes="0;0.5;0.5375;0.7125;0.75;1" values="0;0;1;1;0;0"/>
      </text>
      <text x="97" y="278" opacity="0">
        Continuous Learning
        <animate attributeName="opacity" dur="20s" repeatCount="indefinite" begin="0s"
                 calcMode="linear" keyTimes="0;0.75;0.7875;0.9625;1" values="0;0;1;1;0"/>
      </text>
    </g>
  </g>

  <!-- Centerpiece: Orb -->
  <g transform="translate(1390,210)">
    <!-- Bloom -->
    <circle cx="0" cy="0" r="112" fill="url(#coreBloom)"/>

    <!-- Orb Arcs -->
    <path d="M -70,-40 Q -20,-95 55,-60" fill="none" stroke="#D08770" stroke-width="1" stroke-linecap="round" opacity="0.22"/>
    <path d="M -60,50 Q -5,90 65,45" fill="none" stroke="#D08770" stroke-width="1" stroke-linecap="round" opacity="0.16"/>

    <!-- Ripple -->
    <circle cx="0" cy="0" r="35" fill="none" stroke="#F59E0B" stroke-width="1" opacity="0">
      <animate attributeName="r" values="35;72" dur="10s" calcMode="spline" keySplines="0.3 0 0.6 1" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.2;0" dur="10s" calcMode="spline" keySplines="0.3 0 0.6 1;0.3 0 0.6 1" repeatCount="indefinite"/>
      <animate attributeName="stroke-width" values="1.2;0.4" dur="10s" calcMode="spline" keySplines="0.3 0 0.6 1" repeatCount="indefinite"/>
    </circle>

    <!-- Core -->
    <circle cx="0" cy="0" r="35" fill="url(#coreGradient)" opacity="0.93">
      <animate attributeName="r" values="34;36;34" dur="7s" calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.85;1;0.85" dur="7s" calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1" repeatCount="indefinite"/>
    </circle>

    <!-- Inner shimmer -->
    <circle cx="-4" cy="-5" r="12" fill="url(#shimmerGradient)" opacity="0.25">
      <animate attributeName="opacity" values="0.2;0.4;0.2" dur="6s" calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1" repeatCount="indefinite"/>
      <animate attributeName="r" values="10;13;10" dur="6s" calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Signature -->
  <text x="1504" y="398" text-anchor="end" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" font-weight="400" letter-spacing="0.5" fill="#D08770">SAmarjeet05 · Golden Hour Atmosphere</text>
</svg>
