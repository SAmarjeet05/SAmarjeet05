<svg width="220" height="30" viewBox="0 0 220 30" fill="none"
  xmlns="http://www.w3.org/2000/svg">

  <defs>
    <radialGradient id="goldOrb">
      <stop offset="0%" stop-color="#FFF6D7"/>
      <stop offset="45%" stop-color="#FDBA74"/>
      <stop offset="100%" stop-color="#D08770"/>
    </radialGradient>
  </defs>

  <text x="10" y="19" fill="#AEB6C6" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11" font-weight="600" letter-spacing="1.5">
AI STATUS
  </text>

  <circle cx="100" cy="15" r="4.5" fill="url(#goldOrb)">
    <animate attributeName="r" values="4.5;5;4.5;4.5;4.9;4.5" keyTimes="0;0.18;0.35;0.60;0.78;1" dur="3.2s" repeatCount="indefinite"/>
  </circle>

  <circle cx="100" cy="15" r="7.5" stroke="#E39A63" stroke-width="1.4" fill="none">
    <animate attributeName="stroke-opacity" values="0.25;0.12;0.25" dur="3.2s" repeatCount="indefinite"/>
  </circle>

  <text x="115" y="19" fill="#F5F5F7" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12" font-weight="600">
Optimizing
  </text>

</svg>