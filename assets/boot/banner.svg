<?xml version="1.0" encoding="UTF-8"?>
<svg width="1600" height="420" viewBox="0 0 1600 420"
  xmlns="http://www.w3.org/2000/svg"
  role="img" aria-label="Amarjeet Singh — AI and Machine Learning Engineer">
  <defs>
    <linearGradient id="bgBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F7F3EA"/>
      <stop offset="42%" stop-color="#EEF6FC"/>
      <stop offset="100%" stop-color="#D9E8F3"/>
    </linearGradient>

    <radialGradient id="ambientGlow" cx="18%" cy="48%" r="62%">
      <stop offset="0%" stop-color="#FFF6D9" stop-opacity="0.30"/>
      <stop offset="55%" stop-color="#FFF6D9" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#FFF6D9" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="auroraGlow" cx="80%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#B8D0EB" stop-opacity="0.24"/>
      <stop offset="60%" stop-color="#B8D0EB" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#B8D0EB" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="coreGradient">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="42%" stop-color="#BDD2EA"/>
      <stop offset="100%" stop-color="#5E81AC" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="shimmerGradient">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="coreBloom">
      <stop offset="0%" stop-color="#5E81AC" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#5E81AC" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="threadFade" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#5E81AC" stop-opacity="0.10"/>
      <stop offset="70%" stop-color="#5E81AC" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#5E81AC" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="hairlineWash" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <rect width="1600" height="420" fill="url(#bgBase)"/>
  <rect width="1600" height="420" fill="url(#hairlineWash)"/>
  <ellipse cx="200" cy="210" rx="600" ry="400" fill="url(#ambientGlow)"/>

  <g filter="url(#softBlur)">
    <ellipse cx="1390" cy="205" rx="360" ry="300" fill="url(#auroraGlow)">
      <animateTransform attributeName="transform" type="translate"
        values="0,0;12,-8;-8,8;0,0"
        dur="28s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <g fill="#FFFFFF" opacity="0.045">
    <circle cx="1220" cy="90" r="1.2">
      <animate attributeName="cy" values="90;70;90" dur="42s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1320" cy="300" r="1">
      <animate attributeName="cy" values="300;278;300" dur="38s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1450" cy="170" r="1.5">
      <animate attributeName="cy" values="170;150;170" dur="46s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g stroke="url(#threadFade)" fill="none" stroke-linecap="round">
    <path d="M1290,150 C1110,85 900,120 760,155" stroke-width="0.8" opacity="0.55"/>
    <path d="M1305,225 C1100,275 930,220 780,205" stroke-width="0.75" opacity="0.40"/>
    <path d="M1285,295 C1080,330 910,285 770,245" stroke-width="0.75" opacity="0.30"/>
  </g>

  <g font-family="-apple-system,'Segoe UI',Helvetica,Arial,sans-serif">
    <text x="96" y="196" font-size="68" font-weight="600" letter-spacing="-1" fill="#1E293B">AMARJEET SINGH</text>
    <text x="97" y="234" font-size="20" font-weight="500" letter-spacing="2.4" fill="#6A7688">AI &amp; MACHINE LEARNING ENGINEER</text>

    <g font-size="17" font-weight="400" fill="#475569">
      <text x="97" y="278" opacity="0">
        Building Intelligent Applications
        <animate attributeName="opacity" dur="15s" repeatCount="indefinite" keyTimes="0;0.05;0.28;0.33;1" values="0;1;1;0;0"/>
      </text>
      <text x="97" y="278" opacity="0">
        Crafting Intelligent Software
        <animate attributeName="opacity" dur="15s" repeatCount="indefinite" keyTimes="0;0.33;0.38;0.61;0.66;1" values="0;0;1;1;0;0"/>
      </text>
      <text x="97" y="278" opacity="0">
        Engineering AI Solutions
        <animate attributeName="opacity" dur="15s" repeatCount="indefinite" keyTimes="0;0.66;0.71;0.94;0.99;1" values="0;0;1;1;0;0"/>
      </text>
    </g>
  </g>

  <g transform="translate(1390,198)">
    <circle cx="0" cy="0" r="108" fill="url(#coreBloom)"/>
    <path d="M-70,-40 Q-20,-95 55,-60" fill="none" stroke="#5E81AC" stroke-width="1" opacity="0.18"/>
    <path d="M-60,50 Q-5,90 65,45" fill="none" stroke="#5E81AC" stroke-width="1" opacity="0.12"/>

    <circle cx="0" cy="0" r="35" fill="none" stroke="#5E81AC" stroke-width="1" opacity="0">
      <animate attributeName="r" values="35;72" dur="9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.15;0" dur="9s" repeatCount="indefinite"/>
    </circle>

    <circle cx="0" cy="0" r="35" fill="url(#coreGradient)" opacity="0.95">
      <animate attributeName="r" values="35;35.8;35.2;35" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.92;1;0.94;0.92" dur="8s" repeatCount="indefinite"/>
    </circle>

    <circle cx="-4" cy="-5" r="12" fill="url(#shimmerGradient)" opacity="0.25">
      <animate attributeName="opacity" values="0.15;0.35;0.15" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="r" values="10;12.5;10" dur="6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <text x="1504" y="398" text-anchor="end"
    font-family="-apple-system,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="11" fill="#94A3B8">SAmarjeet05 · Boot Sequence · Sunrise</text>
</svg>
