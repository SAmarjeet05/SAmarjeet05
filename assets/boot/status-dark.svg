<svg width="220" height="30" viewBox="0 0 220 30" fill="none"
  xmlns="http://www.w3.org/2000/svg">

  <defs>
    <radialGradient id="bootOrb">
      <stop offset="0%" stop-color="#BFD6EA"/>
      <stop offset="55%" stop-color="#8FB3D4"/>
      <stop offset="100%" stop-color="#5E81AC"/>
    </radialGradient>
  </defs>

  <text x="10" y="19" fill="#AEB6C6" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11" font-weight="600" letter-spacing="1.5">
AI STATUS
  </text>

  <circle cx="100" cy="15" r="4.5" fill="url(#bootOrb)">
    <animate attributeName="r" values="4.5;4.8;4.5" dur="2.4s" repeatCount="indefinite"/>
  </circle>

  <circle cx="100" cy="15" r="7.5" stroke="#8FB3D4" stroke-width="1.4" fill="none">
    <animate attributeName="r" values="7.5;10;7.5" dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.28;0;0.28" dur="2.4s" repeatCount="indefinite"/>
  </circle>

  <text x="115" y="19" fill="#F5F5F7" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12" font-weight="600">
Booting
  </text>

</svg>